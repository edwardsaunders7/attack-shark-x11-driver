<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attack Shark X11</title>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #252530;
    --accent: #e8383d;
    --accent-dim: rgba(232,56,61,0.15);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #3de8a0;
    --warning: #e8c43d;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
  }

  .logo h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .logo span {
    color: var(--accent);
  }

  .battery-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .battery-badge:hover { border-color: var(--accent); }

  .battery-level {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--success);
    font-weight: 600;
  }

  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .connection-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }

  .connection-bar label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 8px;
  }

  .mode-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .mode-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-header h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .card-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }

  .card-body {
    padding: 20px;
  }

  /* DPI */
  .dpi-stages {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .dpi-stage {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stage-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 20px;
    text-align: center;
  }

  .stage-num.active-stage {
    color: var(--accent);
  }

  .dpi-slider-wrap {
    flex: 1;
    position: relative;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 6px rgba(232,56,61,0.4);
  }

  .dpi-val {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    width: 56px;
    text-align: right;
  }

  .active-btn {
    width: 28px;
    height: 20px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 10px;
    color: var(--muted);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .active-btn.on {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Polling rate */
  .rate-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .rate-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 8px;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .rate-btn:hover { border-color: var(--accent); color: var(--text); }

  .rate-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .rate-hz {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    display: block;
  }

  .rate-label {
    font-size: 11px;
    margin-top: 2px;
    display: block;
  }

  /* Lighting */
  .light-modes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .light-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 6px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    text-align: center;
  }

  .light-btn:hover { border-color: var(--accent); color: var(--text); }

  .light-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .light-icon { font-size: 18px; display: block; margin-bottom: 4px; }

  .lighting-controls {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .control-label {
    font-size: 12px;
    color: var(--muted);
    width: 80px;
    flex-shrink: 0;
  }

  .color-picker-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  input[type=color] {
    -webkit-appearance: none;
    width: 36px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  input[type=color]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 4px; }
  input[type=color]::-webkit-color-swatch { border: none; border-radius: 4px; }

  .hex-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 5px 10px;
    border-radius: 6px;
    width: 90px;
  }

  .speed-dots {
    display: flex;
    gap: 6px;
    flex: 1;
  }

  .speed-dot {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 11px;
    color: var(--muted);
    transition: all 0.15s;
  }

  .speed-dot.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Advanced */
  .adv-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .adv-item label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: var(--accent); }

  /* Apply bar */
  .apply-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13,13,15,0.95);
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    z-index: 20;
  }

  .status-msg {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .status-msg.ok { color: var(--success); }
  .status-msg.err { color: var(--accent); }

  .apply-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.02em;
  }

  .apply-btn:hover { opacity: 0.85; }
  .apply-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .section-apply {
    margin-top: 16px;
    display: flex;
    justify-content: flex-end;
  }

  .small-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }

  .small-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="15" stroke="#e8383d" stroke-width="1.5"/>
      <path d="M8 20 C10 14, 14 10, 16 10 C18 10, 22 14, 24 20" stroke="#e8383d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="20" r="3" fill="#e8383d"/>
      <line x1="16" y1="17" x2="16" y2="10" stroke="#e8383d" stroke-width="1" stroke-dasharray="2,2"/>
    </svg>
    <h1>Attack Shark <span>X11</span></h1>
  </div>
  <button class="battery-badge" onclick="fetchBattery()" title="Click to refresh">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="7" width="18" height="10" rx="2"/>
      <path d="M22 11v2"/>
    </svg>
    <span class="battery-level" id="batteryVal">--</span>
  </button>
</header>

<main>

  <!-- Connection -->
  <div class="connection-bar">
    <label>Connection</label>
    <button class="mode-btn active" id="btnAdapter" onclick="setMode('adapter')">2.4GHz Adapter</button>
    <button class="mode-btn" id="btnWired" onclick="setMode('wired')">Wired</button>
  </div>

  <!-- DPI -->
  <div class="card">
    <div class="card-header">
      <div class="card-dot"></div>
      <h2>DPI Stages</h2>
    </div>
    <div class="card-body">
      <div class="dpi-stages" id="dpiStages"></div>
      <div class="section-apply">
        <button class="small-btn" onclick="applyDpi()">Apply DPI</button>
      </div>
    </div>
  </div>

  <!-- Polling Rate -->
  <div class="card">
    <div class="card-header">
      <div class="card-dot"></div>
      <h2>Polling Rate</h2>
    </div>
    <div class="card-body">
      <div class="rate-grid">
        <button class="rate-btn" data-rate="125" onclick="selectRate(125)">
          <span class="rate-hz">125</span>
          <span class="rate-label">Power Saving</span>
        </button>
        <button class="rate-btn" data-rate="250" onclick="selectRate(250)">
          <span class="rate-hz">250</span>
          <span class="rate-label">Office</span>
        </button>
        <button class="rate-btn" data-rate="500" onclick="selectRate(500)">
          <span class="rate-hz">500</span>
          <span class="rate-label">Gaming</span>
        </button>
        <button class="rate-btn active" data-rate="1000" onclick="selectRate(1000)">
          <span class="rate-hz">1000</span>
          <span class="rate-label">eSports</span>
        </button>
      </div>
      <div class="section-apply">
        <button class="small-btn" onclick="applyPolling()">Apply Polling Rate</button>
      </div>
    </div>
  </div>

  <!-- Lighting -->
  <div class="card">
    <div class="card-header">
      <div class="card-dot"></div>
      <h2>Lighting</h2>
    </div>
    <div class="card-body">
      <div class="light-modes">
        <button class="light-btn active" data-mode="off" onclick="selectLight('off')"><span class="light-icon">🚫</span>Off</button>
        <button class="light-btn" data-mode="static" onclick="selectLight('static')"><span class="light-icon">💡</span>Static</button>
        <button class="light-btn" data-mode="breathing" onclick="selectLight('breathing')"><span class="light-icon">🌬️</span>Breathing</button>
        <button class="light-btn" data-mode="neon" onclick="selectLight('neon')"><span class="light-icon">🌈</span>Neon</button>
        <button class="light-btn" data-mode="colorBreathing" onclick="selectLight('colorBreathing')"><span class="light-icon">🎨</span>Color Breath</button>
        <button class="light-btn" data-mode="staticDpi" onclick="selectLight('staticDpi')"><span class="light-icon">🔵</span>Static DPI</button>
        <button class="light-btn" data-mode="breathingDpi" onclick="selectLight('breathingDpi')"><span class="light-icon">🔴</span>Breathing DPI</button>
      </div>
      <div class="lighting-controls">
        <div class="control-row">
          <span class="control-label">Color</span>
          <div class="color-picker-wrap">
            <input type="color" id="colorPicker" value="#00ff00" oninput="syncHex()">
            <input type="text" class="hex-input" id="hexInput" value="#00ff00" oninput="syncColor()" maxlength="7">
          </div>
        </div>
        <div class="control-row">
          <span class="control-label">Speed</span>
          <div class="speed-dots" id="speedDots"></div>
        </div>
      </div>
      <div class="section-apply">
        <button class="small-btn" onclick="applyLighting()">Apply Lighting</button>
      </div>
    </div>
  </div>

  <!-- Advanced -->
  <div class="card">
    <div class="card-header">
      <div class="card-dot"></div>
      <h2>Power & Response</h2>
    </div>
    <div class="card-body">
      <div class="adv-grid">
        <div class="adv-item">
          <label>Sleep Time</label>
          <select id="sleepTime">
            <option value="0.5">30 sec</option>
            <option value="1">1 min</option>
            <option value="2">2 min</option>
            <option value="3" selected>3 min</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
          </select>
        </div>
        <div class="adv-item">
          <label>Deep Sleep Time</label>
          <select id="deepSleepTime">
            <option value="1">1 min</option>
            <option value="5">5 min</option>
            <option value="10" selected>10 min</option>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
            <option value="60">60 min</option>
          </select>
        </div>
        <div class="adv-item">
          <label>Key Response (debounce)</label>
          <select id="keyResponse">
            <option value="4" selected>4 ms (fastest)</option>
            <option value="6">6 ms</option>
            <option value="8">8 ms</option>
            <option value="10">10 ms</option>
            <option value="16">16 ms</option>
            <option value="20">20 ms</option>
            <option value="30">30 ms</option>
            <option value="50">50 ms (slowest)</option>
          </select>
        </div>
      </div>
      <div class="section-apply">
        <button class="small-btn" onclick="applySleep()">Apply Power & Response</button>
      </div>
    </div>
  </div>

</main>

<div class="apply-bar">
  <span class="status-msg" id="statusMsg">Ready — select settings and apply each section.</span>
  <button class="apply-btn" onclick="applyAll()">Apply All</button>
</div>

<script>
const state = {
  mode: 'adapter',
  dpi: { values: [800, 1600, 3200, 5000, 10000, 22000], active: 1 },
  polling: 1000,
  light: { mode: 'off', rgb: { r: 0, g: 255, b: 0 }, speed: 3 },
};

// ── Init ──────────────────────────────────────────────────────────────────────

function init() {
  renderDpi();
  renderSpeedDots();
  fetchBattery();
}

// ── Battery ───────────────────────────────────────────────────────────────────

async function fetchBattery() {
  const el = document.getElementById('batteryVal');
  el.textContent = '…';
  try {
    const r = await fetch('/api/battery');
    const d = await r.json();
    el.textContent = d.ok ? d.level + '%' : 'err';
  } catch { el.textContent = 'err'; }
}

// ── Connection ────────────────────────────────────────────────────────────────

async function setMode(mode) {
  state.mode = mode;
  document.getElementById('btnAdapter').classList.toggle('active', mode === 'adapter');
  document.getElementById('btnWired').classList.toggle('active', mode === 'wired');
  await fetch('/api/connection', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ mode }) });
}

// ── DPI ───────────────────────────────────────────────────────────────────────

function renderDpi() {
  const wrap = document.getElementById('dpiStages');
  wrap.innerHTML = '';
  state.dpi.values.forEach((v, i) => {
    wrap.innerHTML += `
      <div class="dpi-stage">
        <span class="stage-num ${i === state.dpi.active ? 'active-stage' : ''}">${i + 1}</span>
        <div class="dpi-slider-wrap">
          <input type="range" min="100" max="22000" step="100" value="${v}"
            oninput="updateDpi(${i}, this.value)" />
        </div>
        <span class="dpi-val" id="dpiVal${i}">${v}</span>
        <button class="active-btn ${i === state.dpi.active ? 'on' : ''}" onclick="setActiveStage(${i})" title="Set active">●</button>
      </div>`;
  });
}

function updateDpi(i, val) {
  state.dpi.values[i] = parseInt(val);
  document.getElementById('dpiVal' + i).textContent = val;
}

function setActiveStage(i) {
  state.dpi.active = i;
  renderDpi();
}

async function applyDpi() {
  const r = await post('/api/dpi', { dpiValues: state.dpi.values, activeStage: state.dpi.active });
  setStatus(r.ok ? 'DPI applied ✓' : 'DPI error: ' + r.error, r.ok);
}

// ── Polling Rate ──────────────────────────────────────────────────────────────

function selectRate(rate) {
  state.polling = rate;
  document.querySelectorAll('.rate-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.rate) === rate));
}

async function applyPolling() {
  const r = await post('/api/polling', { rate: state.polling });
  setStatus(r.ok ? 'Polling rate applied ✓' : 'Polling error: ' + r.error, r.ok);
}

// ── Lighting ──────────────────────────────────────────────────────────────────

function selectLight(mode) {
  state.light.mode = mode;
  document.querySelectorAll('.light-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}

function renderSpeedDots() {
  const wrap = document.getElementById('speedDots');
  wrap.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    wrap.innerHTML += `<button class="speed-dot ${i === state.light.speed ? 'active' : ''}" onclick="setSpeed(${i})">${i}</button>`;
  }
}

function setSpeed(s) {
  state.light.speed = s;
  renderSpeedDots();
}

function syncHex() {
  const hex = document.getElementById('colorPicker').value;
  document.getElementById('hexInput').value = hex;
  state.light.rgb = hexToRgb(hex);
}

function syncColor() {
  const hex = document.getElementById('hexInput').value;
  if (/^#[0-9a-f]{6}$/i.test(hex)) {
    document.getElementById('colorPicker').value = hex;
    state.light.rgb = hexToRgb(hex);
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

async function applyLighting() {
  const r = await post('/api/lighting', { lightMode: state.light.mode, rgb: state.light.rgb, ledSpeed: state.light.speed });
  setStatus(r.ok ? 'Lighting applied ✓' : 'Lighting error: ' + r.error, r.ok);
}

// ── Sleep ─────────────────────────────────────────────────────────────────────

async function applySleep() {
  const sleepTime = parseFloat(document.getElementById('sleepTime').value);
  const deepSleepTime = parseInt(document.getElementById('deepSleepTime').value);
  const keyResponse = parseInt(document.getElementById('keyResponse').value);
  const r = await post('/api/sleep', { sleepTime, deepSleepTime, keyResponse });
  setStatus(r.ok ? 'Power settings applied ✓' : 'Error: ' + r.error, r.ok);
}

// ── Apply All ─────────────────────────────────────────────────────────────────

async function applyAll() {
  setStatus('Applying all settings…', null);
  document.querySelector('.apply-btn').disabled = true;
  try {
    await applyDpi();
    await applyPolling();
    await applyLighting();
    await applySleep();
    setStatus('All settings applied ✓', true);
  } catch(e) {
    setStatus('Error: ' + e.message, false);
  } finally {
    document.querySelector('.apply-btn').disabled = false;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

async function post(url, body) {
  try {
    const r = await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    return await r.json();
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

function setStatus(msg, ok) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg' + (ok === true ? ' ok' : ok === false ? ' err' : '');
}

init();
</script>
</body>
</html>
